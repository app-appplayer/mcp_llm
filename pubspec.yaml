name: mcp_llm
description: Dart package for Large Language Model integration with Model Context Protocol (MCP). Multi-provider LLM access (Claude / OpenAI / Gemini / Vertex / Bedrock / Cohere / Mistral / Groq / Together / Custom), MCP client + server orchestration, and Contract Layer adapters for the mcp_bundle ecosystem. Compatible with MCP spec 2024-11-05 / 2025-03-26 / 2025-06-18 / 2025-11-25.
version: 2.0.0
homepage: https://app-appplayer.github.io/makemind
repository: https://github.com/app-appplayer/mcp_llm
issue_tracker: https://github.com/app-appplayer/mcp_llm/issues

topics:
  - llm
  - mcp
  - ai
  - dart
  - flutter

environment:
  sdk: ^3.7.2

dependencies:
  # Contract Layer for knowledge package integration
  mcp_bundle: ^0.3.0

  # Core dependencies
  http: ^1.1.0
  json_annotation: ^4.9.0
  uuid: ^4.0.0
  collection: ^1.19.1
  logging: ^1.2.0
  crypto: ^3.0.3
  
  # Storage and persistence
  sqlite3: ^2.1.0
  path: ^1.8.3
  
dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0
  mockito: ^5.4.5
  build_runner: ^2.4.15
  faker: ^2.1.0  # test data

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows: